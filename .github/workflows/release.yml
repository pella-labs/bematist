name: release

on:
  push:
    tags:
      - "v*"

# This workflow produces the binaries the install.sh / install.ps1
# scripts fetch. Cross-compilation works from ubuntu for all 5 targets
# (bun downloads each target runtime on demand).
#
# Darwin binaries MUST carry a valid ad-hoc code signature — on Apple
# Silicon the kernel refuses to execute arm64 code that lacks one (the
# process is SIGSTOP'd immediately at _dyld_start). `bun --compile`
# appends the JS payload to a linker-signed Bun stub, which invalidates
# the upstream signature; we re-sign with rcodesign (pure-Rust, runs on
# Linux) so CI-built binaries launch correctly. Not notarized — a real
# Developer ID is out of scope — so install.sh still strips
# com.apple.quarantine on download to unblock Gatekeeper on first run.

permissions:
  contents: write # upload assets to the release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build all 5 targets
        working-directory: apps/collector
        run: |
          set -euxo pipefail
          mkdir -p bin
          for target in darwin-arm64 darwin-x64 linux-x64 linux-arm64 windows-x64; do
            ext=""
            [ "$target" = "windows-x64" ] && ext=".exe"
            bun build \
              --compile --minify --sourcemap \
              --target=bun-${target} \
              --no-compile-autoload-dotenv --no-compile-autoload-bunfig \
              src/bin.ts \
              --outfile "bin/pella-${target}${ext}"
          done

      - name: Ad-hoc codesign darwin binaries
        working-directory: apps/collector/bin
        run: |
          set -euxo pipefail
          RCS_VER=0.29.0
          RCS_ARCHIVE=apple-codesign-${RCS_VER}-x86_64-unknown-linux-musl
          curl -fsSL -o rcodesign.tar.gz \
            "https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign%2F${RCS_VER}/${RCS_ARCHIVE}.tar.gz"
          tar -xzf rcodesign.tar.gz
          RCS="./${RCS_ARCHIVE}/rcodesign"
          "$RCS" sign pella-darwin-arm64
          "$RCS" sign pella-darwin-x64
          rm -rf rcodesign.tar.gz "${RCS_ARCHIVE}"

      - name: Generate SHA256SUMS
        working-directory: apps/collector/bin
        run: sha256sum pella-* > SHA256SUMS

      - name: List artifacts
        working-directory: apps/collector/bin
        run: ls -la

      - uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            apps/collector/bin/pella-darwin-arm64
            apps/collector/bin/pella-darwin-x64
            apps/collector/bin/pella-linux-x64
            apps/collector/bin/pella-linux-arm64
            apps/collector/bin/pella-windows-x64.exe
            apps/collector/bin/SHA256SUMS
