# Bema — dev stack (DBs only).
# Apps run via `bun run dev` on the host for fast iteration.
# Postgres is bound to host port 5433 (not 5432) to avoid colliding with other projects.
services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: bematist-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bematist
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bematist"]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:25.8-alpine
    container_name: bematist-clickhouse
    environment:
      CLICKHOUSE_DB: bematist
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: bematist-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Redpanda — single-broker dev cluster. PRD §7.1 G1: webhook ingest emits to
  # topic `github.webhooks` (32 partitions, key = tenant_id:installation_id).
  # Kafka API exposed on 9092; admin API on 9644; Schema Registry disabled for
  # dev (we emit raw JSON). Single-node `--smp 1` minimizes dev footprint.
  redpanda:
    image: redpandadata/redpanda:v24.3.1
    container_name: bematist-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:8082
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
    ports:
      - "127.0.0.1:9092:9092"
      - "127.0.0.1:8082:8082"
      - "127.0.0.1:9644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    # Note: rpk v24.3+ dropped the --brokers flag on `cluster health`; the
    # command defaults to the local broker, which is what we want here.
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  clickhouse-data:
  redis-data:
  redpanda-data:
