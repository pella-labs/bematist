# Bematist — production template. NOT used in Sprint 0; wired up by workstream owners in Sprint 1+.
# Reference: CLAUDE.md §"Self-host stack (prod template)".
services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-bematist}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:25.8-alpine
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-bematist}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  ingest:
    image: bematist/ingest:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: ingest
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bematist}
      CLICKHOUSE_URL: http://clickhouse:8123
      REDIS_URL: redis://redis:6379
      INGEST_LISTEN_ADDR: ":8000"
      LOG_LEVEL: info
    ports:
      - "8000:8000"
      - "4318:4318"
    depends_on:
      postgres: { condition: service_healthy }
      clickhouse: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped

  worker:
    image: bematist/worker:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bematist}
      CLICKHOUSE_URL: http://clickhouse:8123
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped

  web:
    image: bematist/web:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bematist}
      CLICKHOUSE_URL: http://clickhouse:8123
    ports:
      - "3000:3000"
    depends_on:
      ingest: { condition: service_started }
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    profiles: ["otel-collector"]
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
    depends_on:
      ingest: { condition: service_started }
    restart: unless-stopped

volumes:
  postgres-data:
  clickhouse-data:
  redis-data:
